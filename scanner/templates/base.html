<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ReconTool // Ops</title>
    <style>
        /* CYBERSECURITY DARK THEME */
        body {
            background-color: #0a0a0a;
            color: #0f0; /* Terminal Green */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
        }
        a { color: #0f0; text-decoration: none; border-bottom: 1px dashed #0f0; }
        a:hover { background-color: #0f0; color: #000; }
        
        .container { max_width: 900px; margin: 0 auto; }
        .nav { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .nav span { float: right; }
        
        h1, h2, h3 { text-transform: uppercase; border-left: 5px solid #0f0; padding-left: 10px; }
        
        /* TERMINAL CARD STYLE */
        .card {
            border: 1px solid #333;
            background: #111;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.1);
        }
        
        input, button {
            background: #000;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 10px;
            width: 100%;
            font-family: inherit;
            margin-top: 5px;
        }
        button:hover { background: #0f0; color: #000; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th { color: #fff; }
        
        .badge-danger { color: #ff4444; border-color: #ff4444; }
        .scan-loader { display: none; color: yellow; margin-top: 10px; }

        /* NEW STYLE FOR LOGOUT BUTTON TO MATCH LINKS */
        .btn-logout {
            background: none; 
            border: none; 
            color: #0f0; 
            cursor: pointer; 
            text-decoration: none; 
            font-family: inherit; 
            font-size: inherit; 
            padding: 0;
            width: auto;
            border-bottom: 1px dashed #0f0;
        }
        .btn-logout:hover {
            background-color: #0f0;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            
            <strong>[ AUTOMATED RECON SYSTEM v1.0 ]</strong>
            {% if user.is_authenticated %}
                <span>
                    User: {{ user.username }} | 
                    <a href="{% url 'new_scan' %}">New Scan</a> | 
                    <form action="{% url 'logout' %}" method="post" style="display: inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </span>
            {% else %}
                <span><a href="{% url 'login' %}">Login</a> | <a href="{% url 'register' %}">Register</a></span>
            {% endif %}
        </div>
        
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
