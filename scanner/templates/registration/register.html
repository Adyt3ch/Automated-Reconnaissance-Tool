{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto;">
    <h2>[ NEW OPERATOR REGISTRATION ]</h2>
    
    <div class="card">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">>> CREATE ACCOUNT</button>
        </form>
    </div>
    
    <p>Already have access? <a href="{% url 'login' %}">Login here</a></p>
</div>
{% endblock %}
